version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pgt-qdrant
    ports:
      - "6333:6333"   # REST / gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
    restart: unless-stopped

volumes:
  qdrant_data:
